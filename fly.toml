# fly.io config for the static DCSS-WASM site (Caddy serving the
# ASCII + tiles browser builds plus the landing page / virtual keyboard).

app = "dcss-wasm"
primary_region = "fra"

[build]
  dockerfile = "deploy/Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  # Keep one machine of the LATEST deployment always running. With 0 here,
  # fly's auto-start picks any stopped machine when traffic hits an idle
  # app — including stale machines from earlier deploys that haven't been
  # cleaned up — and serves old code from them. Pinning at least one
  # latest-deploy machine to "started" forces fresh code to handle traffic.
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
