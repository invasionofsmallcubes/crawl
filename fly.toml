# fly.io config for the static DCSS-WASM site (Caddy serving the
# ASCII + tiles browser builds plus the landing page / virtual keyboard).

app = "dcss-wasm"
primary_region = "fra"

[build]
  dockerfile = "deploy/Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
