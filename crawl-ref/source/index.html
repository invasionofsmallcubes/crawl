<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DCSS ASCII — WebAssembly</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #000; display: flex; flex-direction: column; align-items: center;
         justify-content: flex-start; min-height: 100vh; padding: 8px; }
  #status { color: #aaa; font-family: monospace; font-size: 13px; margin-bottom: 6px; }
  #terminal { border: 1px solid #333; }
</style>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
</head>
<body>
<div id="status">Loading DCSS…</div>
<div id="terminal"></div>

<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
<script>
// ---------------------------------------------------------------------------
// 1. Terminal setup
// ---------------------------------------------------------------------------
const term = new Terminal({
    cols: 80,
    rows: 24,
    fontFamily: 'Courier New, monospace',
    fontSize: 16,
    theme: { background: '#000000', foreground: '#c0c0c0' },
    cursorStyle: 'underline',
    convertEol: false,
});
const fitAddon = new FitAddon.FitAddon();
term.loadAddon(fitAddon);
term.open(document.getElementById('terminal'));
// Confirm xterm.js is alive immediately.
term.write('\x1b[32mxterm.js OK — waiting for DCSS...\x1b[0m\r\n');

// ---------------------------------------------------------------------------
// 2. Bridge: C -> JS (output)
// ---------------------------------------------------------------------------
// Called by refresh() in libunix.cc to push ANSI frame to xterm.
var dcssWriteCount = 0;
window.dcssWrite = function(ansiStr) {
    dcssWriteCount++;
    if (dcssWriteCount <= 3) {
        console.log('[dcssWrite #' + dcssWriteCount + '] len=' + ansiStr.length,
                    JSON.stringify(ansiStr.slice(0, 80)));
    }
    term.write(ansiStr);
};

// ---------------------------------------------------------------------------
// 3. Bridge: JS -> C (input)
// ---------------------------------------------------------------------------
// Module._dcssKeyResolve is set by getch/get_wch ASYNCIFY stubs;
// calling it with a keycode unblocks the WASM stack.
window.Module = window.Module || {};

// Map xterm key events to ncurses-compatible keycodes.
// Printable chars pass through as-is; special keys use DCSS's expected values.
const KEY_MAP = {
    'ArrowUp':    0x101,  // KEY_UP
    'ArrowDown':  0x102,  // KEY_DOWN
    'ArrowLeft':  0x103,  // KEY_LEFT
    'ArrowRight': 0x104,  // KEY_RIGHT
    'Backspace':  0x107,  // KEY_BACKSPACE
    'Delete':     0x14C,  // KEY_DC
    'Insert':     0x14D,  // KEY_IC
    'Home':       0x106,  // KEY_HOME
    'End':        0x166,  // KEY_END
    'PageUp':     0x153,  // KEY_PPAGE
    'PageDown':   0x152,  // KEY_NPAGE
    'Escape':     27,
    'Tab':        9,
    'Enter':      13,
};

// Key events either unblock a suspended getch() (via
// Module._dcssKeyResolve set by library_dcss.js) or queue up in
// Module._dcssKeyBuffer for the next getch() to drain.
Module._dcssKeyBuffer = [];

term.onKey(function(ev) {
    var key = ev.domEvent.key;
    var code;

    var mapped = KEY_MAP[key];
    if (mapped !== undefined) {
        code = mapped;
    } else if (ev.domEvent.ctrlKey && key.length === 1) {
        code = key.toUpperCase().charCodeAt(0) - 64;
    } else if (key.length === 1) {
        code = key.codePointAt(0);
    } else {
        return;
    }

    if (Module._dcssKeyResolve) {
        Module._dcssKeyResolve(code);
    } else {
        Module._dcssKeyBuffer.push(code);
    }
});

// ---------------------------------------------------------------------------
// 4. Module configuration (must be set before dcss_ascii.js runs)
// ---------------------------------------------------------------------------
Module.noInitialRun = false;
// Override NO_EXIT_RUNTIME so onExit fires when DCSS calls exit().
Module.noExitRuntime = false;

// Tell DCSS to use /crawl as its home dir (no real ~ in WASM).
Module.arguments = ['-dir', '/crawl'];

// Create /crawl and subdirs before main() runs.
Module.preRun = Module.preRun || [];
Module.preRun.push(function() {
    var dirs = ['/crawl', '/crawl/saves', '/crawl/morgue', '/crawl/crash'];
    dirs.forEach(function(d) {
        try { FS.mkdir(d); } catch(e) {}
    });
    Module._dcssKeyBuffer = Module._dcssKeyBuffer || [];
    var ok = FS.analyzePath('/crawl').exists;
    term.write('\x1b[36m[preRun] /crawl exists=' + ok + ' args=' + JSON.stringify(Module.arguments) + '\x1b[0m\r\n');
    console.log('[dcss] preRun done, /crawl exists:', ok);
});

Module.print = function(text) {
    console.log('[dcss stdout]', text);
    term.write(text + '\r\n');
};
Module.printErr = function(text) {
    console.warn('[dcss stderr]', text);
    term.write('\x1b[33m' + text + '\x1b[0m\r\n');
};

Module.onExit = function(code) {
    console.error('[dcss] exited with code', code);
    term.write('\r\n\x1b[31m[DCSS exited with code ' + code + ']\x1b[0m\r\n');
};

Module.onRuntimeInitialized = function() {
    document.getElementById('status').textContent = 'DCSS running — click terminal and press a key to start';
    console.log('[dcss] onRuntimeInitialized — Module._dcss =', Module._dcss);
    term.focus();
    // Periodic check: log game progress so we can tell what's happening.
    var lastWriteCount = 0;
    var lastBufferLen = 0;
    var checkN = 0;
    var checkInterval = setInterval(function() {
        checkN++;
        var bufLen = (Module._dcssKeyBuffer || []).length;
        var hasDcss = !!Module._dcss;
        console.log('[dcss] t=' + checkN + 's',
                    'dcss=' + hasDcss,
                    'writes=' + dcssWriteCount,
                    'bufLen=' + bufLen);
        if (hasDcss) {
            // Game reached initscr(); stop reporting.
            clearInterval(checkInterval);
            term.write('\x1b[32m[initscr() reached at t=' + checkN + 's]\x1b[0m\r\n');
        } else if (checkN === 3) {
            term.write('\r\n\x1b[33m[t=3s] initscr() not reached yet.\r\n' +
                       'If the game is polling a blocking getch() before curses init,\r\n' +
                       'click the terminal and press ENTER to unblock it.\x1b[0m\r\n');
        } else if (checkN >= 15) {
            clearInterval(checkInterval);
            term.write('\r\n\x1b[31m[giving up after 15s — game never called initscr()]\x1b[0m\r\n');
        }
    }, 1000);
};

Module.onAbort = function(what) {
    document.getElementById('status').textContent = 'DCSS ABORTED: ' + what;
    console.error('[dcss] onAbort:', what);
};

// ---------------------------------------------------------------------------
// 5. Load the Emscripten-generated JS glue
// ---------------------------------------------------------------------------
</script>
<script src="crawl.js"></script>
</body>
</html>
