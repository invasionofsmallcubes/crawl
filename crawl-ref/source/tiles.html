<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DCSS Tiles — WebAssembly</title>
<style>
  html, body { height: 100%; }
  body { margin: 0; background: #000; color: #c0c0c0;
         font: 13px monospace; overflow: hidden; }
  /* Fit the canvas inside the viewport while preserving the 1024:768 aspect
     ratio. min() picks the smaller of full viewport width (portrait) or the
     width that makes the height fit the viewport (landscape). --status-h is
     kept as a hook for any future top chrome but is currently 0 (we removed
     the loading-status row to give the canvas the entire viewport). */
  :root { --status-h: 0px; }
  #canvas { display: block; border: 0; outline: none;
            width: min(100vw, calc((100dvh - var(--status-h)) * 4 / 3));
            max-width: 1024px;
            aspect-ratio: 1024 / 768;
            height: auto;
            margin: 0 auto; background: #000;
            /* Pinch-zoom is implemented in JS below by applying a CSS
               transform to this element. transform-origin pins the
               anchor point at the visual top-left so the math stays
               simple; touch-action: none stops Safari from running its
               own page-pinch when the user pinches on the canvas. */
            transform-origin: 0 0;
            touch-action: none; }
  /* dvh fallback for older browsers (treat as vh). */
  @supports not (height: 100dvh) {
    #canvas { width: min(100vw, calc((100vh - var(--status-h)) * 4 / 3)); }
  }
  #canvas:focus { outline: 1px solid #335; }

  /* Diagnostic banner — surfaces module-instantiation failures, runtime
     aborts, and uncaught JS errors. Hidden by default, only appears on
     failure. role="status" + aria-live="assertive" so screen readers
     announce the message immediately. Pinned at the top so the user can
     copy-paste it into a bug report without scrolling under the canvas. */
  #diag-banner {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 9999;
      background: rgba(80, 20, 20, 0.95);
      color: #fff;
      font: 13px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
      padding: 8px 36px 8px 10px;
      border-bottom: 1px solid #c66;
      box-sizing: border-box;
      max-height: 50vh;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
  }
  #diag-banner[hidden] { display: none; }
  #diag-banner .diag-stage { color: #fcc; }
  #diag-banner .diag-close {
      position: absolute;
      top: 4px; right: 6px;
      background: transparent;
      color: inherit;
      border: 0;
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      padding: 0 6px;
  }
</style>
</head>
<body>
<div id="diag-banner" role="status" aria-live="assertive" hidden></div>
<canvas id="canvas" tabindex="-1" width="1024" height="768"></canvas>
<script>
// ---------------------------------------------------------------------------
// Diagnostic hook (installed BEFORE crawl_tiles.js loads so we catch
// instantiation-time failures). Helps users on iOS Safari versions that
// hit WASM compile-time memory limits tell us *what* went wrong instead
// of seeing a blank black canvas. Surfaces:
//   - WebAssembly.compile / instantiate errors  (window 'error' event)
//   - Promise rejections from module loading    ('unhandledrejection')
//   - Module.onAbort runtime traps              (wired below)
//   - printErr lines that look like OOM/abort   (wired below)
// Each message is tagged with a lifecycle "stage" so you can tell pre-
// instantiate failure ("loading") from runtime failure ("running") from
// startup failure ("preRun" / "instantiate").
// ---------------------------------------------------------------------------
(function () {
    var stage = 'loading';
    var banner = document.getElementById('diag-banner');

    function setStage(s) { stage = s; }

    function show(category, msg) {
        if (!banner) return;
        // Prepend rather than replace so multiple errors stack — the FIRST
        // one is usually the most informative.
        var line = document.createElement('div');
        var head = document.createElement('span');
        head.className = 'diag-stage';
        head.textContent = '[' + category + ' / ' + stage + '] ';
        line.appendChild(head);
        line.appendChild(document.createTextNode(String(msg)));
        if (banner.firstChild && banner.firstChild.classList && banner.firstChild.classList.contains('diag-close')) {
            banner.insertBefore(line, banner.firstChild);
        } else {
            banner.insertBefore(line, banner.firstChild || null);
        }
        if (!banner.querySelector('.diag-close')) {
            var btn = document.createElement('button');
            btn.className = 'diag-close';
            btn.setAttribute('aria-label', 'Dismiss diagnostic');
            btn.textContent = '×';
            btn.addEventListener('click', function () { banner.hidden = true; });
            banner.appendChild(btn);
        }
        banner.hidden = false;
    }

    window.__diagSetStage = setStage;
    window.__diagShow     = show;

    function formatError(r) {
        if (!r) return 'unknown';
        if (typeof r === 'string') return r;
        var head = (r.name || 'Error') + ': ' + (r.message || '?');
        return r.stack ? head + '\n' + r.stack : head;
    }

    window.addEventListener('error', function (e) {
        // Filter CORS-masked errors. When a cross-origin script (or some
        // wasm-streaming fallback paths) throws, the browser surfaces a
        // sanitized 'error' event with message="Script error." / empty
        // filename / no error object. Emscripten's loader catches and
        // recovers from these internally, so the game keeps booting; the
        // event is noise. Skip it. A real exception always carries either
        // a filename or an error-with-stack.
        var msg = e.message || '';
        var sanitized = (/^Script error\.?$/i.test(msg) || msg === '');
        if (sanitized && !e.filename && !e.error) return;
        var detail = e.error ? formatError(e.error) : msg;
        var loc = (e.filename ? (' @ ' + e.filename + ':' + e.lineno + ':' + e.colno) : '');
        show('JS error', detail + loc);
    });
    window.addEventListener('unhandledrejection', function (e) {
        show('promise', formatError(e.reason));
    });

    // Boot-time capability check. JSPI requires Safari 18.4+ / Chrome 123+;
    // older browsers will fail at instantiation with an opaque error.
    // Surface the precise reason up front so reports tell us "browser
    // doesn't support JSPI" instead of "promise rejected, no detail".
    if (typeof WebAssembly === 'undefined' || typeof WebAssembly.Suspending !== 'function') {
        show('boot', 'WebAssembly.Suspending is ' +
             (typeof WebAssembly === 'undefined'
                ? 'unavailable (no WebAssembly)'
                : typeof WebAssembly.Suspending) +
             '. This browser does not support JSPI; the wasm will fail to instantiate. ' +
             'JSPI requires Safari 18.4+ or Chrome 123+.');
    }
}());
</script>
<script>
window.DCSS_MODE = 'tiles';

// Intercept addEventListener BEFORE crawl_tiles.js so we can capture SDL2's
// internal keyboard handlers (Emscripten's JSEvents registry is private to
// the crawl_tiles.js IIFE, so we can't reach it after the fact). vkb.js
// invokes the captured handlers directly with synthetic events, bypassing
// DOM dispatch quirks (Chrome's read-only keyCode, bubbling target choice).
window.__vkbKeyListeners = [];
(function () {
    var origAdd = EventTarget.prototype.addEventListener;
    EventTarget.prototype.addEventListener = function (type, listener, opts) {
        if (type === 'keydown' || type === 'keyup' || type === 'keypress') {
            window.__vkbKeyListeners.push({ type: type, listener: listener });
        }
        return origAdd.apply(this, arguments);
    };
})();

// SDL2's Emscripten port reads Module.canvas and routes DOM keyboard/mouse
// events to SDL_PollEvent / SDL_WaitEventTimeout. ASYNCIFY (set in
// Makefile.emscripten-tiles) lets wm->wait_event() suspend cleanly while the
// browser pumps events.
//
// IDBFS save persistence is handled by fs_init.js (wired via --pre-js).
window.Module = {
    canvas: document.getElementById('canvas'),
    arguments: ['-dir', '/crawl'],

    // Lifecycle hooks — each advances the diagnostic stage so an error
    // afterwards is tagged with where in the boot sequence it happened.
    preRun: [function () { window.__diagSetStage && window.__diagSetStage('preRun'); }],
    locateFile: function (path, prefix) {
        if (window.__diagSetStage) window.__diagSetStage('fetching ' + path);
        return prefix + path;
    },

    print: function(t) { console.log('[stdout]', t); },
    printErr: function(t) {
        console.warn('[stderr]', t);
        // Surface compile-time / runtime errors emitted by Emscripten's
        // own logging path even if they don't reach onAbort. iOS WebKit
        // tends to print "RangeError: WebAssembly.Memory()" or
        // "out of memory" before unwinding to a hard abort.
        if (/RangeError|out of memory|OOM|\babort\b|LinkError|CompileError/i.test(t)) {
            window.__diagShow && window.__diagShow('emcc stderr', t);
        }
    },

    onAbort: function(what) {
        console.error('[dcss] onAbort:', what);
        if (window.__diagShow) window.__diagShow('runtime', 'DCSS aborted: ' + what);
    },

    onRuntimeInitialized: function() {
        if (window.__diagSetStage) window.__diagSetStage('running');
        document.getElementById('canvas').focus();
    },

    onExit: function(code) {
        console.error('[dcss] exited with code', code);
        if (code !== 0 && window.__diagShow) {
            window.__diagShow('exit', 'DCSS exited with code ' + code);
        }
        try { FS.syncfs(false, function(e) {}); } catch (e) {}
    }
};

window.addEventListener('beforeunload', function() {
    try { FS.syncfs(false, function(e) {}); } catch (e) {}
});

// ---------------------------------------------------------------------------
// Pinch-to-zoom on the canvas. CSS transform only — the SDL2 render target
// stays at 1024×768; we just up-/down-scale the visual presentation. Two
// fingers pinch to zoom and pan; one finger always passes through so SDL2
// keeps receiving normal mouse-on-tile events. Double-tap with one finger
// resets to 1× when the user gets lost.
// ---------------------------------------------------------------------------
(function () {
    var canvas = document.getElementById('canvas');
    if (!canvas) return;

    var scale = 1, tx = 0, ty = 0;
    var pinch = null;          // active two-finger gesture state
    var lastTap = 0;           // for double-tap-to-reset detection

    function setTransform() {
        canvas.style.transform =
            'translate(' + tx + 'px,' + ty + 'px) scale(' + scale + ')';
    }
    function resetTransform() {
        scale = 1; tx = 0; ty = 0;
        setTransform();
    }
    function dist(a, b) {
        var dx = a.clientX - b.clientX, dy = a.clientY - b.clientY;
        return Math.sqrt(dx*dx + dy*dy);
    }
    function midpoint(a, b) {
        return { x: (a.clientX + b.clientX) / 2,
                 y: (a.clientY + b.clientY) / 2 };
    }
    function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }

    canvas.addEventListener('touchstart', function (e) {
        if (e.touches.length >= 2) {
            // Begin a pinch — capture starting state so we can compute
            // deltas without floating-point drift over the gesture.
            // getBoundingClientRect returns the POST-transform rect, so
            // rect.left = originalLeft + tx; we use that fact below to
            // back-derive originalLeft on the move handler.
            e.preventDefault();
            var rect = canvas.getBoundingClientRect();
            var m = midpoint(e.touches[0], e.touches[1]);
            pinch = {
                startDist:    dist(e.touches[0], e.touches[1]),
                startMid:     m,
                startScale:   scale,
                startTx:      tx,
                startTy:      ty,
                startRectL:   rect.left,
                startRectT:   rect.top,
                // Focal point in pre-transform canvas-local coords. The
                // current scale factor maps post-transform screen to local.
                focalCanvasX: (m.x - rect.left) / scale,
                focalCanvasY: (m.y - rect.top)  / scale,
            };
        }
    }, { passive: false });

    canvas.addEventListener('touchmove', function (e) {
        if (pinch && e.touches.length >= 2) {
            e.preventDefault();
            var d = dist(e.touches[0], e.touches[1]);
            var m = midpoint(e.touches[0], e.touches[1]);
            var newScale = clamp(pinch.startScale * (d / pinch.startDist), 1, 4);
            // Keep the focal canvas-local point glued to the current
            // finger midpoint while scaling. originalLeft = startRectL -
            // startTx (rect was post-transform when captured), and we
            // need: m.x = originalLeft + newTx + focalCanvasX * newScale.
            // Solving for newTx and simplifying:
            tx = m.x + pinch.startTx - pinch.startRectL - pinch.focalCanvasX * newScale;
            ty = m.y + pinch.startTy - pinch.startRectT - pinch.focalCanvasY * newScale;
            scale = newScale;
            setTransform();
        }
    }, { passive: false });

    canvas.addEventListener('touchend', function (e) {
        if (e.touches.length < 2) {
            pinch = null;
            // Snap back to identity if the user pinched out almost to 1×.
            if (scale < 1.05) resetTransform();
        }
        // Double-tap reset: two single-finger taps within 300ms while
        // zoomed → restore 1×. Useful escape hatch.
        if (e.changedTouches.length === 1 && scale > 1) {
            var now = Date.now();
            if (now - lastTap < 300) {
                resetTransform();
                e.preventDefault();
            }
            lastTap = now;
        }
    }, { passive: false });
}());
</script>
<script src="crawl_tiles.js"></script>
<script src="vkb.js"></script>
<script>
if ('serviceWorker' in navigator) {
    // See index.html for the rationale; PWA teardown only.
    navigator.serviceWorker.getRegistrations()
        .then(function (regs) { regs.forEach(function (r) { r.unregister(); }); })
        .catch(function () {});
    if ('caches' in window) {
        caches.keys()
            .then(function (names) {
                names.forEach(function (n) {
                    if (n.indexOf('dcss-') === 0) caches.delete(n);
                });
            })
            .catch(function () {});
    }
}
</script>
</body>
</html>
